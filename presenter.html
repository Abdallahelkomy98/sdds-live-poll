<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presenter - Live Results</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#001030,#002060,#001030);min-height:100vh;color:#fff;padding:30px}
        .hdr{text-align:center;margin-bottom:30px}
        .hdr h1{color:#fdcc33;font-size:2em}
        .hdr p{color:#b4d2ff;margin-top:5px}
        .tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:30px}
        .tab{padding:10px 18px;background:rgba(0,60,120,.5);border:1px solid rgba(253,204,51,.3);border-radius:10px;color:#b4d2ff;cursor:pointer;font-size:.85em;transition:all .3s}
        .tab:hover,.tab.active{background:rgba(253,204,51,.2);border-color:#fdcc33;color:#fdcc33}
        .board{display:none}
        .board.active{display:block}
        .board h2{color:#fdcc33;text-align:center;margin-bottom:20px;font-size:1.4em}
        .word-cloud{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;padding:20px}
        .word-tag{background:linear-gradient(135deg,#fdcc33,#f0a000);color:#001840;padding:12px 28px;border-radius:30px;font-weight:700;font-size:1.3em;animation:pop .4s ease;box-shadow:0 4px 15px rgba(253,204,51,.3)}
        .word-tag:nth-child(even){font-size:1.5em}
        .word-tag:nth-child(3n){font-size:1.1em}
        @keyframes pop{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
        .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;max-height:70vh;overflow-y:auto;padding:10px}
        .card{background:rgba(0,60,120,.5);border:1px solid rgba(253,204,51,.3);border-radius:14px;padding:20px;animation:slide .3s ease}
        @keyframes slide{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .card .name{color:#fdcc33;font-size:.75em;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
        .card .answer{color:#fff;font-size:1.05em;line-height:1.4}
        .empty{text-align:center;color:#6090c0;font-size:1.2em;margin-top:60px}
        .count{text-align:center;color:#6090c0;margin-bottom:15px;font-size:.9em}
        .refresh-note{text-align:center;color:#4a6a90;font-size:.75em;margin-top:20px}
    </style>
</head>
<body>
    <div class="hdr">
        <h1>&#x1F3AF; LIVE RESULTS</h1>
        <p>MEA Oral Care SDDS FY26-27 | Auto-refreshes every 3 seconds</p>
    </div>
    <div class="tabs" id="tabs"></div>
    <div id="boards"></div>
    <div class="refresh-note">Results update automatically every 3 seconds</div>

    <script>
    const BLOBS = {
        "one-word":"019ec9e4-e9d0-7b9d-b335-d43155ffb616",
        "swot-strengths":"019ec9e4-ec77-70c8-8cc7-0ff8471fe841",
        "swot-weaknesses":"019ec9e4-fcaf-7775-9a34-bb0d97816040",
        "swot-opportunities":"019ec9e4-ff95-737f-ba0c-4ab2d823981a",
        "swot-threats":"019ec9e5-0238-79bb-b41f-b38967ea2eee",
        "future-headlines":"019ec9e5-049e-7412-9a1a-a3412bb9f658",
        "if-i-were-khaled":"019ec9e5-0710-70af-9aff-b7ae4bbc1ed0",
        "one-commitment":"019ec9e5-16c7-7705-960e-a88a3c65b42e"
    };
    const POLLS = [
        {id:"one-word",title:"One Word",icon:"\uD83D\uDCAC",type:"word"},
        {id:"swot-strengths",title:"Strengths",icon:"\uD83D\uDCAA",type:"text"},
        {id:"swot-weaknesses",title:"Weaknesses",icon:"\u26A0\uFE0F",type:"text"},
        {id:"swot-opportunities",title:"Opportunities",icon:"\uD83D\uDE80",type:"text"},
        {id:"swot-threats",title:"Threats",icon:"\uD83D\uDD25",type:"text"},
        {id:"future-headlines",title:"Headlines",icon:"\uD83D\uDCF0",type:"text"},
        {id:"if-i-were-khaled",title:"If I Were Khaled",icon:"\uD83E\uDD14",type:"text"},
        {id:"one-commitment",title:"Commitment",icon:"\uD83C\uDFAF",type:"text"}
    ];

    let activePoll = 'one-word';
    const tabsEl = document.getElementById('tabs');
    const boardsEl = document.getElementById('boards');

    // Build tabs and boards
    POLLS.forEach(p => {
        tabsEl.innerHTML += `<div class="tab ${p.id===activePoll?'active':''}" data-id="${p.id}" onclick="switchTab('${p.id}')">${p.icon} ${p.title}</div>`;
        if(p.type==='word'){
            boardsEl.innerHTML += `<div class="board ${p.id===activePoll?'active':''}" id="board-${p.id}"><h2>${p.icon} ${p.title}</h2><div class="count" id="count-${p.id}"></div><div class="word-cloud" id="resp-${p.id}"></div></div>`;
        } else {
            boardsEl.innerHTML += `<div class="board ${p.id===activePoll?'active':''}" id="board-${p.id}"><h2>${p.icon} ${p.title}</h2><div class="count" id="count-${p.id}"></div><div class="cards" id="resp-${p.id}"></div></div>`;
        }
    });

    function switchTab(id){
        activePoll = id;
        document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.id===id));
        document.querySelectorAll('.board').forEach(b=>b.classList.toggle('active',b.id==='board-'+id));
        loadPoll(id);
    }

    async function loadPoll(id){
        const blobId = BLOBS[id];
        const poll = POLLS.find(p=>p.id===id);
        try{
            const r = await fetch(`https://jsonblob.com/api/jsonBlob/${blobId}`);
            const data = await r.json();
            const responses = data.responses || [];
            const container = document.getElementById('resp-'+id);
            const countEl = document.getElementById('count-'+id);
            
            countEl.textContent = responses.length + ' response' + (responses.length!==1?'s':'');
            
            if(responses.length === 0){
                container.innerHTML = '<div class="empty">Waiting for responses...</div>';
                return;
            }
            
            if(poll.type==='word'){
                container.innerHTML = responses.map(r=>`<span class="word-tag">${r.answer}</span>`).join('');
            } else {
                container.innerHTML = responses.map(r=>`<div class="card"><div class="name">${r.name}</div><div class="answer">${r.answer}</div></div>`).join('');
            }
        }catch(e){
            console.error('Load failed:',e);
        }
    }

    // Initial load
    loadPoll(activePoll);

    // Auto-refresh every 3 seconds
    setInterval(()=>loadPoll(activePoll), 3000);

    // Also check URL param
    const qp = new URLSearchParams(location.search).get('q');
    if(qp && BLOBS[qp]) switchTab(qp);
    </script>
</body>
</html>
